<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ 'Edit' if ticket else 'New' }} Ticket</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<h1>{{ 'Edit' if ticket else 'New' }} Ticket</h1>
<form method="post">
  <label>Title:<br>
    <input type="text" name="title" value="{{ ticket.title if ticket else '' }}">
  </label><br>
  <label>Description:<br>
    <textarea name="description">{{ ticket.description if ticket else '' }}</textarea>
  </label><br>
  <label>Status:<br>
    <input type="text" name="status" value="{{ ticket.status if ticket else '' }}">
  </label><br>
  <button type="submit">Save</button>
</form>
<p><a href="{{ url_for('index') }}">Cancel</a></p>
</body>
</html>
